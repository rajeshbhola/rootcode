<meta charset="utf-8" />
<meta content='text/html; charset=utf-8' http-equiv='Content-Type'>
<meta http-equiv='X-UA-Compatible' content='IE=edge'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>

<!-- Additional SEO Meta Tags (supplements jekyll-seo-tag) -->
<meta name="author" content="{{ site.author | default: site.name }}" />
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

<!-- OpenGraph Image -->
{% if page.image %}
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}{{ page.image }}" />
<meta property="og:image:secure_url" content="{{ site.url }}{{ site.baseurl }}{{ page.image }}" />
{% else %}
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/images/logo.svg" />
{% endif %}
{% if page.date %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
<meta property="article:author" content="{{ site.author }}" />
{% endif %}
{% if page.modified %}
<meta property="article:modified_time" content="{{ page.modified | date_to_xmlschema }}" />
{% endif %}

<!-- Twitter Card Image -->
{% if page.image %}
<meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}{{ page.image }}" />
{% else %}
<meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/images/logo.svg" />
{% endif %}
{% if site.footer-links.twitter %}
<meta name="twitter:creator" content="@{{ site.footer-links.twitter }}" />
<meta name="twitter:site" content="@{{ site.footer-links.twitter }}" />
{% endif %}

<!-- Pagination Links -->
{% if paginator.previous_page %}
<link rel="prev" href="{{ site.url }}{{ paginator.previous_page_path }}" />
{% endif %}
{% if paginator.next_page %}
<link rel="next" href="{{ site.url }}{{ paginator.next_page_path }}" />
{% endif %}
